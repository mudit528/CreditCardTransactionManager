<nav class="bg-[#1F2937] text-white px-6 py-4 flex items-center justify-between sticky top-0 z-50 shadow-lg">
  <a routerLink="/" class="flex items-center gap-2">
    <div class="bg-white p-1.5 rounded-lg">
      <lucide-icon [name]="CreditCard" class="text-[#1F2937] w-6 h-6"></lucide-icon>
    </div>
    <span class="text-xl font-bold tracking-tight">Credit Card Manager</span>
  </a>

  <div class="flex items-center gap-8">
    <a 
      routerLink="/"
      routerLinkActive="text-blue-400 font-medium"
      [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center gap-2 transition-colors text-gray-300 hover:text-white"
    >
      <lucide-icon [name]="LayoutDashboard" size="18"></lucide-icon>
      <span>Dashboard</span>
    </a>
    <a 
      routerLink="/cards"
      routerLinkActive="text-blue-400 font-medium"
      class="flex items-center gap-2 transition-colors text-gray-300 hover:text-white"
    >
      <lucide-icon [name]="CreditCard" size="18"></lucide-icon>
      <span>All Cards</span>
    </a>
    <a 
      routerLink="/transactions"
      routerLinkActive="text-blue-400 font-medium"
      class="flex items-center gap-2 transition-colors text-gray-300 hover:text-white"
    >
      <lucide-icon [name]="History" size="18"></lucide-icon>
      <span>All Transactions</span>
    </a>
  </div>

  <div class="flex items-center gap-4">
    <div class="flex items-center gap-3 pr-4 border-r border-gray-700">
      <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center font-bold text-sm">
        {{user.name.charAt(0).toUpperCase()}}
      </div>
      <div class="flex flex-col leading-none">
        <span class="text-sm font-medium">{{user.name}}</span>
        <span class="text-[10px] text-gray-400 uppercase tracking-wider">{{user.role}}</span>
      </div>
    </div>
    <button 
      (click)="logout.emit()"
      class="flex items-center gap-2 text-sm text-gray-300 hover:text-red-400 transition-colors"
    >
      <lucide-icon [name]="LogOut" size="16"></lucide-icon>
      <span>Logout</span>
    </button>
  </div>
</nav>
