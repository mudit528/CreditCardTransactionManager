<div class="tx-view">
  <header class="header">
    <div>
      <a routerLink="/" class="back-btn">← Dash</a>
      <h2>Records</h2>
    </div>
    <div class="search-wrap">
      <lucide-icon [name]="Search" size="16"></lucide-icon>
      <input [(ngModel)]="search" placeholder="Search..." />
    </div>
  </header>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Merchant</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of filtered">
          <td class="id">{{t.id}}</td>
          <td class="date">{{t.date}}</td>
          <td class="merchant">{{t.merchant}}</td>
          <td [class]="'amt ' + (t.amount < 0 ? 'neg' : 'pos')">
            {{t.amount < 0 ? '-' : '+'}}₹{{formatAmount(t.amount)}}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
